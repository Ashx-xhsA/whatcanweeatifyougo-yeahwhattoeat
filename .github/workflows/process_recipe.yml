name: Process Mobile Recipe Issue

on:
  issues:
    types: [opened, labeled, edited]

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  process-recipe:
    if: contains(toJson(github.event.issue.labels), 'recipe') || github.event.label.name == 'recipe'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests openai

      - name: Parse Issue and Commit Recipe
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python3 scripts/issue_to_recipe.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/recipes.json
          git add public/images/recipes/ || true
          git commit -m "Auto-add recipe from Issue #${{ github.event.issue.number }}" || exit 0
          git push

      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✨ Recipe successfully parsed, translated, and added to the vault via DeepSeek! 🚀"
